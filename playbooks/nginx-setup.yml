- name: Ensure Nginx is installed and configured
  hosts: webservers
  become: true
  vars:
    nginx_conf_src: files/nginx.conf
    nginx_conf_dest: /etc/nginx/nginx.conf

  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: true

    - name: Push custom nginx config
      copy:
        src: "{{ nginx_conf_src }}"
        dest: "{{ nginx_conf_dest }}"
        owner: root
        group: root
        mode: '0644'
      notify: Restart nginx

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: true

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
